  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="tabs">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="publications.html">Writing</a>
    <a href="cartography.html">Maps</a>
    <a href="cv.html">CV</a>
    <a href="contact.html" class="active">Contact</a>
    <span class="spacer"></span>
    <a href="game.html" class="play-pill">play · resilience</a>
    <button class="theme-btn" type="button">☾ dark</button>
  </nav>

  <section class="page-top fade-in">
    <div class="section-no">Contact</div>
    <h1 class="page-title">Contact</h1>
    <p class="page-lede">For collaborations, talks, or correspondence.</p>
  </section>

  <main class="contact-wrap fade-in">
    <form id="contact-form" class="contact" novalidate>
      <div class="honeypot" aria-hidden="true">
        <label>Don't fill this in: <input type="text" name="_gotcha" tabindex="-1" autocomplete="off"></label>
      </div>

      <label>
        Name
        <input type="text" name="name" required autocomplete="name">
      </label>

      <label>
        Email
        <input type="email" name="email" required autocomplete="email">
      </label>

      <label>
        Subject
        <input type="text" name="subject" required>
      </label>

      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>

      <div class="puzzle" id="puzzle">
        <div class="puzzle-head">
          <div>
            <div class="puzzle-title">Slide the dial to match the target.</div>
            <div class="puzzle-sub">Spam check.</div>
          </div>
          <div class="puzzle-status" id="puzzle-status">unsolved</div>
        </div>
        <div class="puzzle-track" id="puzzle-track">
          <div class="puzzle-target" id="puzzle-target"></div>
          <div class="puzzle-fill" id="puzzle-fill"></div>
          <div class="puzzle-handle" id="puzzle-handle" tabindex="0" role="slider"
               aria-label="Slide to match the target" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span class="puzzle-grip"></span>
          </div>
        </div>
        <div class="puzzle-foot">
          <span class="puzzle-hint" id="puzzle-hint">Drag, or use ← →. Hold <kbd>Shift</kbd> for finer control.</span>
          <button type="button" class="puzzle-reset" id="puzzle-reset">New puzzle</button>
        </div>
      </div>

      <input type="hidden" id="form-ts" name="ts" value="">
      <input type="hidden" id="puzzle-solved" name="puzzle_solved" value="0">

      <button type="submit">Send message</button>
    </form>

    <p style="margin-top: 32px; font-family: var(--serif); font-size: 15px; color: var(--ink-muted);">
      Also on <a href="https://researchmap.jp/rjayousi?lang=en" target="_blank" rel="noopener" style="color: var(--accent);">ResearchMap</a> and <a href="https://orcid.org/0000-0002-4991-7667" target="_blank" rel="noopener" style="color: var(--accent);">ORCID</a>.
    </p>
  </main>

  <footer class="colophon">
    <span>© <span data-year></span> Rashed Al Jayousi</span>
    <span>rjayousi.me</span>
  </footer>
  <script src="script.js"></script>
</body>
</html>
